# yaml-language-server: $schema=../../../configuration-schema.json
package: deprecation
output: gen.go
generate:
  models: true
  client: true
  strict-server: true
  std-http-server: true
output-options:
  # to make sure that all types are generated, even if they're unreferenced
  skip-prune: true
  client-type-name: APIClient
