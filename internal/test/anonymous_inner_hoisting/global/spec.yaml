openapi: "3.0.0"
info:
  title: Test inline struct hoisting
  version: "1.0"
paths:
  /roles/{id}:
    summary: Get role by id
    get:
      operationId: GetRolesId
      tags:
      - role
      parameters:
        - name: id
          in: path
          description: Role ID
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Role
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessfulResponse'
                  - properties:
                      data:
                        type: object
                        properties:
                          role:
                            $ref: '#/components/schemas/Role'
                        required: [ role ]
  # Reference the top-level `Roles` array schema from an operation so
  # the default prune pass doesn't strip it before codegen runs.
  /roles:
    get:
      operationId: GetRoles
      tags:
      - role
      responses:
        '200':
          description: All roles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Roles'

components:
  schemas:
    SuccessfulResponse:
      type: object
      properties:
        ok:
          type: boolean
          default: true
          description: Indicated whether the response is successful.
        data:
          type: object
          description: If successful, response from api
      required:
        - ok
        - data
    Role:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
      required:
        - id
        - name
    # Regression for: top-level array of inline objects. Under
    # generate-types-for-anonymous-schemas, this must emit a named
    # element type (Roles_Item) rather than `type Roles = []struct{...}`.
    # The auto-hoist inside GenerateGoSchema is gated on len(path)>1,
    # which fails for a top-level component path, so the array-item hoist
    # in oapiSchemaToGoType has to cover this case.
    Roles:
      type: array
      items:
        type: object
        properties:
          id:
            type: integer
          name:
            type: string
        required:
          - id
          - name
