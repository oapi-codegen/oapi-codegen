# From issue-2308: external spec providing reusable path items and responses.
openapi: "3.1.0"
info:
  version: "0.0.1"
  title: ext
paths: {}
components:
  # An OpenAPI 3.1 reusable path item, referenced from the base spec's `paths`.
  pathItems:
    VersionOperations:
      get:
        responses:
          '200':
            # A response ref that is relative to *this* (external) file. After
            # the path item is inlined into the base document, this ref looks
            # identical to a base-local ref, so the generator must remember it
            # came from the external file (see issue #2308).
            $ref: '#/components/responses/VersionGetResponse'
    OutcomeOperations:
      get:
        responses:
          '200':
            $ref: '#/components/responses/Outcome'
  responses:
    VersionGetResponse:
      description: the running version
      content:
        application/json:
          schema:
            type: string
    # x-go-name renames the response model in *this* package to OutcomeResult.
    # The base package's client wrapper must reference externalRef0.OutcomeResult
    # (the imported model name), not the raw component name (issue #2308).
    Outcome:
      x-go-name: OutcomeResult
      description: the outcome
      content:
        application/json:
          schema:
            type: string
