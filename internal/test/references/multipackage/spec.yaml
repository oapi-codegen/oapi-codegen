openapi: "3.0.0"
info: { }
paths: { }
components:
  # Reproduces https://github.com/oapi-codegen/oapi-codegen/issues/2383
  # The scopes constant for a $ref'd security scheme must alias the one
  # declared by the import-mapped package, sharing the context key.
  securitySchemes:
    BearerAuth:
      $ref: ./packageA/spec.yaml#/components/securitySchemes/BearerAuth
  schemas:
    Container:
      properties:
        object_a:
          $ref: ./packageA/spec.yaml#/components/schemas/ObjectA
        object_b:
          $ref: ./packageB/spec.yaml#/components/schemas/ObjectB
        object_c:
          $ref: ./object_c.json
        pet:
          $ref: https://raw.githubusercontent.com/swagger-api/swagger-petstore/refs/heads/master/src/main/resources/openapi.yaml#/components/schemas/Pet
