# yaml-language-server: $schema=../../../../configuration-schema.json
package: referencesmultipackage
generate:
  models: true
  embedded-spec: true
import-mapping:
  ./packageA/spec.yaml: github.com/oapi-codegen/oapi-codegen/v2/internal/test/references/multipackage/packageA
  ./packageB/spec.yaml: package_b github.com/oapi-codegen/oapi-codegen/v2/internal/test/references/multipackage/packageB
  https://raw.githubusercontent.com/swagger-api/swagger-petstore/refs/heads/master/src/main/resources/openapi.yaml: github.com/oapi-codegen/oapi-codegen/v2/internal/test/references/multipackage/petstore
output: externalref.gen.go
output-options:
  skip-prune: true
# issue-2383: the BearerAuth scopes constant must alias packageA's instead of
# declaring a distinct context key type.
compatibility:
  enable-auth-scopes-on-context: true
