# yaml-language-server: $schema=../../../../../configuration-schema.json
package: packagea
generate:
  models: true
  embedded-spec: true
# issue-2383: emit the BearerAuth scopes context key so that packages
# generated from specs $ref'ing this one can alias it.
compatibility:
  enable-auth-scopes-on-context: true
output-options:
  skip-prune: true
import-mapping:
  ../packageB/spec.yaml: github.com/oapi-codegen/oapi-codegen/v2/internal/test/references/multipackage/packageB
output: externalref.gen.go
