openapi: "3.0.0"
info: {title: t, version: "1.0.0"}
# Two different path items each declare a path-level anyOf parameter named
# "id". Each path declares the union member types (Id0, Id1) once, so across
# the two paths they are declared twice and collide (issue #2090). ValidateSpec
# should reject this before code generation.
paths:
  /a/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          anyOf: [{type: string, format: uuid}, {type: string, pattern: '^[a-z]+$'}]
    get:
      operationId: getA
      responses: {'200': {description: ok}}
  /b/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          anyOf: [{type: string, format: uuid}, {type: string, pattern: '^[a-z]+$'}]
    get:
      operationId: getB
      responses: {'200': {description: ok}}
