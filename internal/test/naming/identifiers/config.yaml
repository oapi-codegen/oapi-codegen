# yaml-language-server: $schema=../../../../configuration-schema.json
package: namingidentifiers
output: identifiers.gen.go
# Union of the flags every folded case needs:
#   - models       : issue1767 (underscore field → PascalCase)
#   - strict-server: issue-head-digit-of-operation-id (operationId starting with digit)
#                    issue-head-digit-of-httpheader   (header name starting with digit)
#   - skip-prune   : keep schemas/components not referenced by a path (all three sources)
generate:
  models: true
  strict-server: true
output-options:
  skip-prune: true
