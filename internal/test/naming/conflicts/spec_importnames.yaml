# ==========================================================================
# Category: naming/conflicts
# Tests:    Package names that appear as text in parameter descriptions must
#           not be mistakenly treated as import names by the code generator.
#
# Folds in (provenance):
#   - issues/issue-grab_import_names  (avoid conflicting pkg names in comments)
# ==========================================================================
openapi: "3.0.2"

info:
  title: grab-import-names
  description: |
    Parameter descriptions that list Go package names (base64, chi, context,
    echo, fmt, etc.) must not cause the codegen to emit spurious import
    statements for those packages.
  version: 0.0.0

paths:
  # issue grab_import_names: parameter descriptions contain Go package names
  # that must not be picked up as import paths by the code generator.
  /foo:
    get:
      operationId: importNamesFoo
      parameters:
        - name: Foo
          in: header
          description: base64. bytes. chi. context. echo. errors. fmt. gzip. http. io. json. openapi3.
          schema:
            type: string
          required: false
        - name: Bar
          in: header
          description: openapi_types. path. runtime. strings. time.Duration time.Time url. xml. yaml.
          schema:
            type: string
          required: false
      description: Tests that package names in descriptions are not grabbed as imports.
      responses:
        200:
          description: OK
          content:
            application/json:
              schema:
                type: string
