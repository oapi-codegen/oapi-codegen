# Enum cases folded from components/components.yaml. Compile-only (the source had no
# runtime enum assertions). Isolated in a sub-package so its enum constants cannot collide
# with the issue-illegal_enum_names constants in the parent schemas/enums package.
openapi: "3.0.1"
info:
  version: "1.0.0"
  title: schemas/enums (components fold)
  description: |
    Enum identifier generation: type-name prefixing on value conflicts (Enum1/2/3),
    unmodified values (Enum4), numeric enums (Enum5), allOf-combined enums
    (EnumUnion/EnumUnion2), and edge-case value names (FunnyValues).
paths: {}
components:
  schemas:
    Enum1:
      description: |
        Conflicts with Enum2, enum values need to be prefixed with type
        name.
      type: string
      enum: [ One, Two, Three ]
    Enum2:
      description: |
        Conflicts with Enum1, enum values need to be prefixed with type
        name.
      type: string
      enum: [ Two, Three, Four ]
    Enum3:
      description: |
        Enum values conflict with Enums above, need to be prefixed
        with type name.
      type: string
      enum: [ Enum1One, Foo, Bar ]
    Enum4:
      description: |
        No conflicts here, should have unmodified enums
      type: string
      enum: [ Cat, Dog, Mouse ]
    Enum5:
      description: |
        Numerical enum
      type: integer
      enum: [ 5, 6, 7 ]
    EnumUnion:
      description: |
        Two enums of the same type combined with allOf.
      allOf:
        - $ref: "#/components/schemas/Enum1"
        - $ref: "#/components/schemas/Enum2"
    EnumUnion2:
      description: |
        Two enums of the same type combined with allOf.
      allOf:
        - $ref: "#/components/schemas/Enum1"
        - enum: [ Seven ]
    FunnyValues:
      description: Edge cases for enum names
      type: string
      enum:
        - '*'
        - '5'
        - '&'
        - '%'
        - ''
    # schemas.yaml issue #375: enum nested in an object inside an array must not be
    # declared twice in the generated output.
    EnumInObjInArray:
      type: array
      items:
        type: object
        properties:
          val:
            type: string
            enum:
              - first
              - second
