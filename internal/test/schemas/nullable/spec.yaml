openapi: "3.0.3"
info:
  title: schemas/nullable
  version: "1.0.0"
  description: |
    Required/optional x nullable matrix (issue #1039) and array of nullable
    items (issue #2185). Uses the OpenAPI 3.0 nullable:true idiom.
paths:
  /example:
    patch:
      # issue #1039: PATCH with a request body exercising all nullable variants
      operationId: examplePatch
      requestBody:
        description: The patch body
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchRequest"
      responses:
        "200":
          description: OK
components:
  schemas:
    # issue #1039: required/optional x nullable matrix
    # Each field of PatchRequest covers one cell of the matrix.
    PatchRequest:
      type: object
      description: A request to patch an existing user object.
      required:
        - simple_required_nullable
        - complex_required_nullable
      properties:
        simple_required_nullable:
          # required and nullable
          $ref: "#/components/schemas/SimpleRequiredNullable"
        simple_optional_nullable:
          # optional and nullable
          $ref: "#/components/schemas/SimpleOptionalNullable"
        simple_optional_non_nullable:
          # optional and non-nullable
          $ref: "#/components/schemas/SimpleOptionalNonNullable"
        complex_required_nullable:
          # required and nullable
          $ref: "#/components/schemas/ComplexRequiredNullable"
        complex_optional_nullable:
          # optional and nullable
          $ref: "#/components/schemas/ComplexOptionalNullable"
      additionalProperties: false

    # issue #1039: simple scalar nullable types
    SimpleRequiredNullable:
      type: integer
      nullable: true
      description: Simple required and nullable

    SimpleOptionalNullable:
      type: integer
      nullable: true
      description: Simple optional and nullable

    SimpleOptionalNonNullable:
      type: string
      description: Simple optional and non nullable

    # issue #1039: complex (object) nullable types
    ComplexRequiredNullable:
      type: object
      nullable: true
      description: Complex required and nullable
      properties:
        name:
          description: Optional and non nullable
          type: string

    ComplexOptionalNullable:
      type: object
      description: Complex, optional and nullable
      properties:
        alias_name:
          description: Optional and nullable
          type: string
          nullable: true
        name:
          description: Optional and non nullable
          type: string
      nullable: true

    # issue #2185: array whose items can be null (nullable items, not nullable array)
    Container:
      required:
        - "may-be-null"
      properties:
        "may-be-null":
          type: array
          items:
            type: string
            nullable: true
