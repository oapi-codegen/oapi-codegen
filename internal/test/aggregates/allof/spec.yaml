# ==========================================================================
# Category: aggregates/allof
# Tests:    allOf composition with additionalProperties on constituent schemas;
#           additionalProperties merge-precedence across all combinations of
#           true/false/schema/default in allOf members;
#           deeply nested oneOf inside allOf-of-allOf (issue #1905).
#
# Folds in (provenance):
#   - issues/issue193   (allOf + additionalProperties)
#   - issues/issue-1219 (additionalProperties merge precedence)
#   - issues/issue-1905 (nested oneOf lost in allOf-of-allOf merge)
# ==========================================================================
openapi: "3.0.1"
info:
  title: aggregates/allof
  version: "1.0.0"
  description: |
    allOf composition with additionalProperties on constituent schemas (issue #193);
    additionalProperties merge-precedence rules across all combinations of
    true/false/schema/default in allOf members (issue #1219).
paths: {}
components:
  schemas:
    # --- issue #193: allOf with additionalProperties: true on all members ---
    # The merged Person schema must flatten properties from both allOf members
    # and produce a single custom Marshal/Unmarshal that handles AdditionalProperties.
    PersonAllOfAdditional:
      allOf:
        # common fields
        - type: object
          additionalProperties: true
          required:
            - metadata
          properties:
            metadata:
              type: string
        # person specific fields
        - type: object
          additionalProperties: true
          properties:
            name:
              type: string
            age:
              type: number

    # --- issue #1219: additionalProperties merge precedence in allOf ---
    # Building-block schemas used as allOf members:
    WithAnyAdditional1:
      type: object
      properties:
        field1:
          type: integer
        field2:
          type: string
      additionalProperties: true
    WithAnyAdditional2:
      type: object
      properties:
        fieldA:
          type: integer
        fieldB:
          type: string
      additionalProperties: true
    WithStringAdditional1:
      type: object
      properties:
        field1:
          type: integer
        field2:
          type: string
      additionalProperties:
        type: string
    WithStringAdditional2:
      type: object
      properties:
        fieldA:
          type: integer
        fieldB:
          type: string
      additionalProperties:
        type: string
    WithoutAdditional1:
      type: object
      properties:
        field1:
          type: integer
        field2:
          type: string
      additionalProperties: false
    WithoutAdditional2:
      type: object
      properties:
        fieldA:
          type: integer
        fieldB:
          type: string
      additionalProperties: false
    DefaultAdditional1:
      type: object
      properties:
        field1:
          type: integer
        field2:
          type: string
    DefaultAdditional2:
      type: object
      properties:
        fieldA:
          type: integer
        fieldB:
          type: string

    # Merged schemas — all combinations of additionalProperties settings:
    MergeWithoutWithout:
      allOf:
        - $ref: '#/components/schemas/WithoutAdditional1'
        - $ref: '#/components/schemas/WithoutAdditional2'
    MergeWithoutWithString:
      allOf:
        - $ref: '#/components/schemas/WithoutAdditional1'
        - $ref: '#/components/schemas/WithStringAdditional2'
    MergeWithoutWithAny:
      allOf:
        - $ref: '#/components/schemas/WithoutAdditional1'
        - $ref: '#/components/schemas/WithAnyAdditional2'
    MergeWithoutDefault:
      allOf:
        - $ref: '#/components/schemas/WithoutAdditional1'
        - $ref: '#/components/schemas/DefaultAdditional2'

    MergeWithStringWithout:
      allOf:
        - $ref: '#/components/schemas/WithStringAdditional1'
        - $ref: '#/components/schemas/WithoutAdditional2'
    # MergeWithStringWithString is omitted: merging two typed sub-schemas is not yet
    # implemented (see issue #1219 comments).
    MergeWithStringWithAny:
      allOf:
        - $ref: '#/components/schemas/WithStringAdditional1'
        - $ref: '#/components/schemas/WithAnyAdditional2'
    MergeWithStringDefault:
      allOf:
        - $ref: '#/components/schemas/WithStringAdditional1'
        - $ref: '#/components/schemas/DefaultAdditional2'

    MergeWithAnyWithout:
      allOf:
        - $ref: '#/components/schemas/WithAnyAdditional1'
        - $ref: '#/components/schemas/WithoutAdditional2'
    MergeWithAnyWithString:
      allOf:
        - $ref: '#/components/schemas/WithAnyAdditional1'
        - $ref: '#/components/schemas/WithStringAdditional2'
    MergeWithAnyWithAny:
      allOf:
        - $ref: '#/components/schemas/WithAnyAdditional1'
        - $ref: '#/components/schemas/WithAnyAdditional2'
    MergeWithAnyDefault:
      allOf:
        - $ref: '#/components/schemas/WithAnyAdditional1'
        - $ref: '#/components/schemas/DefaultAdditional2'

    MergeDefaultWithout:
      allOf:
        - $ref: '#/components/schemas/DefaultAdditional1'
        - $ref: '#/components/schemas/WithoutAdditional2'
    MergeDefaultWithString:
      allOf:
        - $ref: '#/components/schemas/DefaultAdditional1'
        - $ref: '#/components/schemas/WithStringAdditional2'
    MergeDefaultWithAny:
      allOf:
        - $ref: '#/components/schemas/DefaultAdditional1'
        - $ref: '#/components/schemas/WithAnyAdditional2'
    MergeDefaultDefault:
      allOf:
        - $ref: '#/components/schemas/DefaultAdditional1'
        - $ref: '#/components/schemas/DefaultAdditional2'

    # --- issue #1905: deeply nested oneOf inside allOf-of-allOf ---
    # The outer allOf merges two members: an inner allOf (which itself wraps a
    # oneOf with two variants) and a plain object with a_foo.  The bug: the
    # merge walk stops after one level, so the oneOf inside the inner allOf is
    # silently dropped and neither the union field nor the variant types appear
    # in the generated output.
    NestedOneOfInAllOf:
      allOf:
        - allOf:
            - oneOf:
                - properties:
                    a_foo_one_of_0:
                      type: string
                - properties:
                    a_foo_one_of_1:
                      type: string
        - properties:
            a_foo:
              type: string
