# ==========================================================================
# Category: aggregates/allof — new-merge-schemas triple
# Tests:    allOf composition with the default (new) merge behavior produces
#           flat structs with required fields promoted from allOf members.
#
# Folds in (provenance):
#   - all_of/v2 (new/default merge behavior — no old-merge-schemas flag)
# ==========================================================================
openapi: "3.1.0"
info:
  title: aggregates/allof — new-merge-schemas
  version: "1.0.0"
  description: |
    allOf composition under the default merge behavior (all_of/v2).
    Without old-merge-schemas, allOf members are inlined into a single flat
    struct where required fields from inner schemas are promoted to required
    on the merged struct.
paths:
  /placeholder:
    get:
      operationId: placeholderNewMerge
      description: |
        Validators want at least one path, so this makes them happy.
      responses:
        default:
          description: placeholder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewMergePersonWithID"
components:
  schemas:
    # all_of/v2: PersonProperties, Person, PersonWithID, PersonWithMorePropertiesOutsideOfAllOf
    # Prefixed with "NewMerge" to avoid colliding with the OldMerge* types from
    # spec_old_merge.yaml (both files compile into the same package aggregatesallof).
    NewMergePersonProperties:
      type: object
      description: |
        These are fields that specify a person. They are all optional, and
        would be used by an `Edit` style API endpoint, where each is optional.
      properties:
        FirstName:
          type: string
        LastName:
          type: string
        GovernmentIDNumber:
          type: integer
          format: int64
    NewMergePerson:
      type: object
      description: |
        This is a person, with mandatory first and last name, but optional ID
        number. This would be returned by a `Get` style API. We merge the person
        properties with another Schema which only provides required fields.
      allOf:
        - $ref: "#/components/schemas/NewMergePersonProperties"
        - required: [ FirstName, LastName ]
    NewMergePersonWithID:
      type: object
      description: |
        This is a person record as returned from a Create endpoint. It contains
        all the fields of a Person, with an additional resource UUID.
      allOf:
        - $ref: "#/components/schemas/NewMergePerson"
        - properties:
            ID:
              type: integer
              format: int64
          required: [ ID ]
    NewMergePersonWithMorePropertiesOutsideOfAllOf:
      type: object
      description: |
        This is a person record as returned from a Create endpoint. It contains
        all the fields of a Person, with an additional property outside of allOf directives.
      properties:
        additionalProperty:
          type: string
      required: [ additionalProperty ]
      allOf:
        - $ref: "#/components/schemas/NewMergePerson"
