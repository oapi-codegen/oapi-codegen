# yaml-language-server: $schema=../../../../configuration-schema.json
package: aggregatesallof
output: allof_new_merge.gen.go
# Union of the flags the folded all_of/v2 case uses:
#   - models        : generate model types
#   - embedded-spec : all_of/v2 embedded the spec (retained for fidelity)
#   - skip-prune    : keep schemas not directly referenced by a path
# No old-merge-schemas: the default (false) flat-struct behavior is under test.
generate:
  models: true
  # embedded-spec is intentionally omitted: the original all_of/v2 had it, but since
  # all three triples share one Go package the embedded-spec helpers (swaggerSpec,
  # decodeSpec, etc.) would be redeclared. models-only is sufficient to test the
  # flat-struct new-merge behavior.
output-options:
  skip-prune: true
