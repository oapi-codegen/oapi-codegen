# ==========================================================================
# Category: aggregates/allof — old-merge-schemas triple
# Tests:    allOf composition with compatibility.old-merge-schemas=true produces
#           struct embedding (rather than flat structs) for allOf members.
#
# Folds in (provenance):
#   - all_of/v1 (legacy merge behavior via old-merge-schemas compatibility flag)
# ==========================================================================
openapi: "3.1.0"
info:
  title: aggregates/allof — old-merge-schemas
  version: "1.0.0"
  description: |
    allOf composition under compatibility.old-merge-schemas=true (all_of/v1).
    With this flag set, allOf members that are $refs are emitted as embedded
    structs rather than having their properties inlined into a flat struct.
paths:
  /placeholder:
    get:
      operationId: placeholderOldMerge
      description: |
        Validators want at least one path, so this makes them happy.
      responses:
        default:
          description: placeholder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OldMergePersonWithID"
components:
  schemas:
    # all_of/v1: PersonProperties, Person, PersonWithID, PersonWithMorePropertiesOutsideOfAllOf
    # Prefixed with "OldMerge" to avoid colliding with the identical schema names in
    # spec_new_merge.yaml (both files compile into the same package aggregatesallof).
    OldMergePersonProperties:
      type: object
      description: |
        These are fields that specify a person. They are all optional, and
        would be used by an `Edit` style API endpoint, where each is optional.
      properties:
        FirstName:
          type: string
        LastName:
          type: string
        GovernmentIDNumber:
          type: integer
          format: int64
    OldMergePerson:
      type: object
      description: |
        This is a person, with mandatory first and last name, but optional ID
        number. This would be returned by a `Get` style API. We merge the person
        properties with another Schema which only provides required fields.
      allOf:
        - $ref: "#/components/schemas/OldMergePersonProperties"
        - required: [ FirstName, LastName ]
    OldMergePersonWithID:
      type: object
      description: |
        This is a person record as returned from a Create endpoint. It contains
        all the fields of a Person, with an additional resource UUID.
      allOf:
        - $ref: "#/components/schemas/OldMergePerson"
        - properties:
            ID:
              type: integer
              format: int64
          required: [ ID ]
    OldMergePersonWithMorePropertiesOutsideOfAllOf:
      type: object
      description: |
        This is a person record as returned from a Create endpoint. It contains
        all the fields of a Person, with an additional property outside of allOf directives.
      properties:
        additionalProperty:
          type: string
      required: [ additionalProperty ]
      allOf:
        - $ref: "#/components/schemas/OldMergePerson"
