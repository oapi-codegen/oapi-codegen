# ==========================================================================
# Category: bodies/content_types
# Tests:    Request/response content-type handling — supported vs unsupported
#           media types, multiple JSON-bearing media types (+json variants),
#           problem+json, vnd.*+json, and text/plain body coercion.
#
# Folds in (provenance):
#   - schemas/schemas.yaml Issue127  (unsupported types must not preempt supported)
#   - schemas/schemas.yaml Issue1051 (multiple JSON-bearing media types)
#   - issue #1127      (request/response body with several +json media types)
#   - issue #1168      (application/problem+json responses)
#   - issue-vnd-json   (application/vnd.api+json, incl. anyOf error body)
#   - issue #1914      (text/plain request body coerces UUID/number to string)
#
# Models + client only (compile-only except the issue-1914 client assertions).
# The strict-server content-type regressions live in sibling sub-packages
# (multi_json, json_suffix, text_and_json) because each needs server codegen
# for a specific framework and they would collide in one package.
# ==========================================================================
openapi: 3.0.3
info:
  version: "1.0.0"
  title: bodies/content_types
  description: |
    Response and request content-type handling: a mix of supported/unsupported
    media types, multiple JSON-bearing media types (application/json + vnd.*+json
    + *+json), problem+json, and text/plain scalar-body coercion.
paths:
  # schemas.yaml Issue127: unsupported content types must not preempt supported ones.
  /issues/127:
    get:
      operationId: Issue127
      description: |
        Make sure unsupported context types don't preempt supported types.
      responses:
        200:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
            text/markdown:
              schema:
                $ref: "#/components/schemas/GenericObject"
            text/yaml:
              schema:
                $ref: "#/components/schemas/GenericObject"
            application/xml:
              schema:
                $ref: "#/components/schemas/GenericObject"
        default:
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GenericObject"
            text/markdown:
              schema:
                $ref: "#/components/schemas/GenericObject"

  # schemas.yaml Issue1051: multiple media types that all contain JSON.
  /issues/1051:
    get:
      operationId: Issue1051
      description: |
        Multiple media types contain JSON
      responses:
        '200':
          content:
            application/vnd.something.v1+json:
              schema:
                type: object
            application/json:
              schema:
                type: object

  # issue #1127: a request body (and response) declaring several +json media
  # types (application/json-patch+json, text/json, application/*+json) plus
  # text/plain must all generate, with the *+json wildcard treated as JSON.
  /whatever:
    post:
      operationId: CreateWhatever
      requestBody:
        content:
          application/json-patch+json:
            schema:
              $ref: "#/components/schemas/Whatever"
          application/json:
            schema:
              $ref: "#/components/schemas/Whatever"
          text/json:
            schema:
              $ref: "#/components/schemas/Whatever"
          application/*+json:
            schema:
              $ref: "#/components/schemas/Whatever"
      responses:
        201:
          description: Whatever created
          content:
            text/plain:
              schema:
                $ref: "#/components/schemas/Whatever"
            application/json:
              schema:
                $ref: "#/components/schemas/Whatever"
            text/json:
              schema:
                $ref: "#/components/schemas/Whatever"

  # issue #1168: application/problem+json (RFC 7807) responses, referenced via
  # reusable response components, must generate as JSON.
  /v1/test:
    get:
      summary: Get it
      responses:
        '200':
          description: Successful response
          content:
            text/plain:
              type: string
        '400':
          $ref: '#/components/responses/Misc400Error'
        '404':
          $ref: '#/components/responses/Misc404Error'

  # issue-vnd-json: application/vnd.api+json (JSON:API) must be recognized as
  # JSON, including an anyOf error body on a non-2xx response.
  /items:
    post:
      operationId: createItem
      responses:
        "200":
          content:
            application/vnd.api+json:
              schema:
                $ref: "#/components/schemas/item"
        "422":
          content:
            application/vnd.api+json:
              schema:
                anyOf:
                  - $ref: "#/components/schemas/error_a"
                  - $ref: "#/components/schemas/error_b"

  # issue #1914: a text/plain request body whose schema is a scalar must coerce
  # the Go value to a string. Left without an operationId on purpose so the
  # synthesized client helpers are NewPostPetRequestWithTextBody /
  # NewPostPet1234RequestWithTextBody (exercised by the test).
  /pet:
    post:
      description: Ensure that the `text/plain` format correctly handles coercing a UUID type to a string.
      requestBody:
        content:
          text/plain:
            schema:
              type: string
              format: uuid
  /pet/1234:
    post:
      description: Ensure that the `text/plain` format correctly handles coercing a numerical type to a string.
      requestBody:
        content:
          text/plain:
            schema:
              type: number
components:
  schemas:
    # schemas.yaml Issue127/Issue1051
    GenericObject:
      type: object
    # issue #1127
    Whatever:
      type: object
      properties:
        someProperty:
          type: string
    # issue-vnd-json
    item:
      type: object
      properties:
        id:
          type: string
    error_a:
      type: object
      properties:
        message:
          type: string
    error_b:
      type: object
      properties:
        code:
          type: integer
    # issue #1168 (from https://github.com/zalando/problem/; MIT License)
    ProblemDetails:
      type: object
      additionalProperties: true
      properties:
        type:
          type: string
          format: uri
          description: >-
            An absolute URI that identifies the problem type.  When dereferenced,
            it SHOULD provide human-readable documentation for the problem type
            (e.g., using HTML).
          default: 'about:blank'
          example: 'https://zalando.github.io/problem/constraint-violation'
        title:
          type: string
          description: >-
            A short, summary of the problem type. Written in english and readable
            for engineers (usually not suited for non technical stakeholders and
            not localized); example: Service Unavailable
        status:
          type: integer
          format: int32
          description: >-
            The HTTP status code generated by the origin server for this occurrence
            of the problem.
          minimum: 100
          maximum: 600
          exclusiveMaximum: true
          example: 503
        detail:
          type: string
          description: >-
            A human readable explanation specific to this occurrence of the
            problem.
          example: Connection to database timed out
        instance:
          type: string
          format: uri
          description: >-
            An absolute URI that identifies the specific occurrence of the problem.
            It may or may not yield further information if dereferenced.
  responses:
    # issue #1168
    Misc400Error:
      description: Bad request
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
    Misc404Error:
      description: Not found
      content:
        application/problem+json:
          schema:
            $ref: '#/components/schemas/ProblemDetails'
