# issue #2238: an optional (required:false) array COOKIE param must NOT be sent when nil,
# and must be sent when non-nil. (The companion header case lives in parameters/header/nilcheck.)
openapi: "3.0.0"
info:
  version: "1.0.0"
  title: parameters/cookie/nilcheck
  description: |
    Optional array cookie parameter nil-omission in the generated client.
paths:
  /test:
    get:
      parameters:
        - name: tags
          in: cookie
          schema:
            type: array
            items:
              type: string
          required: false
