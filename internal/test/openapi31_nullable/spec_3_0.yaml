openapi: 3.0.3
info:
  title: Nullable test (OpenAPI 3.0)
  version: 1.0.0
  description: |
    Control case for the OpenAPI 3.1 nullable backport. Each nullable
    field uses the 3.0 idiom (`nullable: true`) so the generated Go
    shape can be compared against the 3.1 type-array idiom.
paths: {}
components:
  schemas:
    Pet:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          description: Required, non-nullable.
        nickname:
          type: string
          nullable: true
          description: "Optional, nullable scalar via 3.0 `nullable: true`."
        tags:
          type: array
          nullable: true
          items:
            type: string
          description: "Optional, nullable array."
        owner:
          type: object
          nullable: true
          properties:
            id:
              type: string
          description: "Optional, nullable inline object."
