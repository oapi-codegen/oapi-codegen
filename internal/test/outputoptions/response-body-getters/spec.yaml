openapi: "3.0.0"
info:
  version: 1.0.0
  title: Example code for the `skip-response-body-getters` output option
paths:
  /things/{id}:
    get:
      summary: Get a thing by id
      operationId: getThing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: a thing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thing'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    Thing:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
