# yaml-language-server: $schema=../../../../configuration-schema.json
package: extensionsxgotype
output: x_go_type.gen.go
# Union of the flags every folded case needs:
#   - models       : all four folded sources need type definitions
#   - echo-server  : issue-1397 uses echo-server + client + embedded-spec to verify
#                    x-go-type-name on nested objects compiles correctly
#   - client       : issue-1397
#   - embedded-spec: issue-832 and issue-1397
#   - skip-prune   : extensions/x-go-type and issue-1957 keep unreferenced schemas
#                    (SomeObject, SomeInteger are not path-referenced)
generate:
  models: true
  echo-server: true
  client: true
  embedded-spec: true
output-options:
  skip-prune: true
