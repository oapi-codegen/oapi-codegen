# ==========================================================================
# Category: extensions/x_go_type
# Tests:    x-go-type for type overrides; x-go-type-import for external
#           packages; x-go-type-name for inline enum/nested-object renaming;
#           x-go-type combined with x-go-type-skip-optional-pointer.
#
# Folds in (provenance):
#   - extensions/x-go-type              (base x-go-type with external imports)
#   - issues/issue-832                  (x-go-type-name on inline enums)
#   - issues/issue-1397                 (x-go-type-name on nested objects)
#   - issues/issue1957                  (x-go-type + skip-optional-pointer + import)
# ==========================================================================
openapi: "3.1.0"
info:
  title: extensions/x_go_type
  version: "1.0.0"
  description: |
    x-go-type for type overrides; x-go-type-import for external packages;
    x-go-type-name for inline enum renaming and nested object renaming;
    x-go-type combined with x-go-type-skip-optional-pointer.
paths:
  # issue #832: x-go-type-name on inline enum; two operations to keep the schemas reachable
  /example:
    get:
      operationId: exampleGet
      responses:
        '200':
          description: "OK"
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/Document'
  /example2:
    get:
      operationId: exampleGet2
      responses:
        '200':
          description: "OK"
          content:
            'application/json':
              schema:
                $ref: '#/components/schemas/DocumentStatus'

  # issue #1397: x-go-type-name on nested object; echo-server and client generated
  /test:
    get:
      operationId: test
      requestBody:
        content:
          application/test+json:
            schema:
              $ref: "#/components/schemas/Test"
      responses:
        204:
          description: good

  # issue #1957: x-go-type + x-go-type-skip-optional-pointer combined; query param
  /root:
    get:
      operationId: getRoot
      parameters:
        - in: query
          name: at
          schema:
            type: string
            format: date-time
            x-go-type-skip-optional-pointer: true
            x-go-type: googleuuid.UUID
            x-go-type-import:
              path: github.com/google/uuid
              name: googleuuid
      responses:
        "200":
          description: Some data

components:
  schemas:
    # --- extensions/x-go-type: base x-go-type with external package imports ---
    SomeInteger:
      type: integer
      x-go-type-import:
        name: rate
        path: golang.org/x/time/rate
    SomeObject:
      type: object
      required:
        - int_as_string
        - int_as_big_int
      properties:
        int_as_string:
          $ref: '#/components/schemas/SomeInteger'
          x-go-type: string
        int_as_rate_limit:
          $ref: '#/components/schemas/SomeInteger'
          x-go-type: rate.Limit
        int_as_uuid:
          $ref: '#/components/schemas/SomeInteger'
          x-go-type: googleuuid.UUID
          x-go-type-import:
            path: github.com/google/uuid
            name: googleuuid

    # --- issue #832: x-go-type-name on inline enum within a schema ---
    Document:
      type: object
      properties:
        name:
          type: string
        status:
          x-go-type-name: Document_Status
          type: string
          enum: [one, two, three, four]
    DocumentStatus:
      type: object
      properties:
        value:
          type: string

    # --- issue #1397: x-go-type-name on nested objects (with and without name) ---
    Test:
      type: object
      properties:
        field1:
          description: A array of enum values
          items:
            enum:
            - option1
            - option2
            type: string
          maxItems: 5
          minItems: 0
          type: array
        field2:
          description: A nested object with allocated name
          properties:
            field1:
              type: boolean
            field2:
              type: string
          required:
          - field1
          - field2
          type: object
          x-go-type-name: MyTestRequestNestedField
        field3:
          description: A nested object without allocated name
          properties:
            field1:
              type: boolean
            field2:
              type: string
          required:
          - field1
          - field2
          type: object
      x-go-type-name: MyTestRequest

    # --- issue #1957: x-go-type + x-go-type-skip-optional-pointer used together ---
    TypeWithOptionalField:
      type: object
      properties:
        at:
          type: string
          x-go-type-skip-optional-pointer: true
          x-go-type: googleuuid.UUID
          x-go-type-import:
            path: github.com/google/uuid
            name: googleuuid
        at_required:
          type: string
          x-go-type: googleuuid.UUID
          x-go-type-import:
            path: github.com/google/uuid
            name: googleuuid
      required:
        - at_required
    ID:
      type: string
      x-go-type: googleuuid.UUID
      x-go-type-import:
        path: github.com/google/uuid
        name: googleuuid
    TypeWithAllOf:
      type: object
      properties:
        id:
          allOf:
            - $ref: '#/components/schemas/ID'
            - x-go-type-skip-optional-pointer: true
