# ==========================================================================
# Category: options/response_getters  (shared spec for the enabled/ + skipped/ sub-packages)
# Tests:    the skip-response-body-getters output option.
#
# Folds in (provenance):
#   - outputoptions/response-body-getters/enabled  (getters generated by default)
#   - outputoptions/response-body-getters/skipped  (getters suppressed when flag is true)
#
# Both sub-packages generate client+models from THIS spec; only the
# skip-response-body-getters flag differs. They live in separate Go packages because
# each emits the same client infrastructure (Client, GetThingResponse, ...) and would
# collide in one package — and the skipped variant's test must reflect on a real
# GetThingResponse wrapper to assert the getters are ABSENT.
# ==========================================================================
openapi: "3.0.0"
info:
  version: "1.0.0"
  title: response_getters
  description: |
    Example for the skip-response-body-getters output option: GET /things/{id}
    returns a Thing (200) or an Error (default), producing a GetThingResponse
    client wrapper with GetBody/GetJSON200/GetJSONDefault getters by default.
paths:
  /things/{id}:
    get:
      summary: Get a thing by id
      operationId: getThing
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: a thing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Thing'
        default:
          description: error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
components:
  schemas:
    Thing:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
        name:
          type: string
    Error:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
        message:
          type: string
