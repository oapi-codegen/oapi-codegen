# yaml-language-server: $schema=../../../../configuration-schema.json
package: optionsnamenormalizer
output: to_camel_case.gen.go
# name-normalizer: ToCamelCase — standard camelCase without initialism expansion;
#   uuid stays Uuid, http stays Http, digit "2" is not a word boundary (CamelOneOf2things).
# models-only: gorilla-server/client/embedded-spec cannot be combined across
# multiple triples in the same package (shared client/server types collide).
# skip-prune: retain CamelError schema which is not referenced from any path.
generate:
  models: true
output-options:
  skip-prune: true
  name-normalizer: ToCamelCase
