openapi: "3.0.0"
info:
  version: 1.0.0
  title: Example code for the `name-normalizer` output option (ToCamelCaseWithInitialisms)
  description: |
    Spec for the ToCamelCaseWithInitialisms name-normalizer triple.
    Common Go initialisms are expanded: uuid → UUID, http → HTTP, id → ID.
    Digit "2" is treated as a word boundary so OneOf2things → OneOf2Things.
paths:
  /api/pets/{petId}:
    get:
      summary: Get pet given identifier.
      # ToCamelCaseWithInitialisms: getHttpPet → GetHTTPPet (HTTP is an initialism)
      operationId: getHttpPet
      parameters:
      - name: petId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: valid pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InitialismPet'
components:
  schemas:
    InitialismPet:
      type: object
      required:
        - uuid
        - name
      properties:
        uuid:
          type: string
          description: The pet uuid.
        name:
          type: string
          description: The name of the pet.
    InitialismError:
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
          description: Error code
        message:
          type: string
          description: Error message
    # ToCamelCaseWithInitialisms: "2" treated as word boundary → OneOf2Things;
    # "things" starts new word and its initial is capitalised.
    InitialismOneOf2things:
      description: "Notice that the `things` is not capitalised in the source"
      oneOf:
        - type: object
          required:
            - id
          properties:
            id:
              type: integer
        - type: object
          required:
            - id
          properties:
            id:
              type: string
              format: uuid
