# yaml-language-server: $schema=../../../../configuration-schema.json
package: optionsnamenormalizer
output: unset.gen.go
# unset: no name-normalizer set; default Go casing applies.
# models-only: gorilla-server/client/embedded-spec cannot be combined across
# multiple triples in the same package (shared client/server types collide).
# The name-normalizer effect is fully observable via the generated model names.
# skip-prune: retain UnsetError schema which is not referenced from any path.
generate:
  models: true
output-options:
  skip-prune: true
