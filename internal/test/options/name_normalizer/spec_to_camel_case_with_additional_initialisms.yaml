openapi: "3.0.0"
info:
  version: 1.0.0
  title: Example code for the `name-normalizer` output option (ToCamelCaseWithInitialisms + additional-initialisms)
  description: |
    Spec for the ToCamelCaseWithInitialisms + additional-initialisms:[NAME] triple.
    Builds on ToCamelCaseWithInitialisms (uuid → UUID, http → HTTP, id → ID)
    and adds NAME as a custom initialism so the "name" field becomes NAME.
paths:
  /api/pets/{petId}:
    get:
      summary: Get pet given identifier.
      # ToCamelCaseWithInitialisms + NAME: getHttpPet → GetHTTPPet
      operationId: getHttpPet
      parameters:
      - name: petId
        in: path
        required: true
        schema:
          type: string
      responses:
        '200':
          description: valid pet
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExtraPet'
components:
  schemas:
    ExtraPet:
      type: object
      required:
        - uuid
        - name
      properties:
        uuid:
          type: string
          description: The pet uuid.
        name:
          type: string
          description: The name of the pet.
    ExtraError:
      required:
        - code
        - message
      properties:
        code:
          type: integer
          format: int32
          description: Error code
        message:
          type: string
          description: Error message
    # ToCamelCaseWithInitialisms+NAME: "2" is word boundary → ExtraOneOf2Things;
    # "things" capitalised; "name" is custom initialism → NAME field on ExtraPet.
    ExtraOneOf2things:
      description: "Notice that the `things` is not capitalised in the source"
      oneOf:
        - type: object
          required:
            - id
          properties:
            id:
              type: integer
        - type: object
          required:
            - id
          properties:
            id:
              type: string
              format: uuid
