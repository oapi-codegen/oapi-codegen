# ==========================================================================
# Category: options/filter  (shared spec for the operations/ + tags/ sub-packages)
# Tests:    output filtering by operationId (-include-operation-ids) and by tag
#           (-include-tags). Each sub-package generates an echo ServerInterface from
#           THIS spec with a different filter, so the filtered-out operation must be
#           absent from the generated interface. They are separate Go packages because
#           each emits a ServerInterface and they would collide in one package.
#
# Folds in (provenance):
#   - filter/operations  (-include-operation-ids included-operation1,included-operation2)
#   - filter/tags        (-include-tags included-tag1,included-tag2)
# ==========================================================================
openapi: "3.0.1"
info:
  version: 1.0.0
  title: Test Server
  license:
    name: MIT
  description: |
    This tests whether filtering works correctly
paths:
  /included1:
    get:
      operationId: included-operation1
      tags:
        - included-tag1
      responses:
        200:
          application/json:
            schema:
              $ref: '#/components/schemas/SchemaObject'
  /filtered:
    get:
      operationId: filtered-operation
      tags:
        - filtered-tag
      responses:
        200:
          application/json:
            schema:
              $ref: '#/components/schemas/SchemaObject'
  /included2:
    get:
      operationId: included-operation2
      tags:
        - included-tag2
      responses:
        200:
          application/json:
            schema:
              $ref: '#/components/schemas/SchemaObject'

components:
  schemas:
    SchemaObject:
      properties:
        firstName:
          type: string
      required:
        - firstName
