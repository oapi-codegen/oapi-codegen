# ==========================================================================
# Category: options/compatibility
# Tests:    compatibility.preserve-original-operation-id-casing-in-embedded-spec
#
# Folds in (provenance):
#   - compatibility/preserve-original-operation-id-casing-in-embedded-spec
#       (raw operationId preserved in embedded spec blob)
# ==========================================================================
openapi: "3.0.0"
info:
  title: options/compatibility
  version: "1.0.0"
  description: |
    Tests that preserve-original-operation-id-casing-in-embedded-spec keeps the
    raw operationId string from the spec in the embedded spec blob. Mixed-case
    and kebab+camel+snake operationIds must be preserved exactly as written.
paths:
  /pet:
    get:
      # compatibility/preserve-original-operation-id-casing-in-embedded-spec: simple camelCase operationId
      operationId: getPet
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
    delete:
      # compatibility/preserve-original-operation-id-casing-in-embedded-spec: mixed kebab+camel+SNAKE operationId
      # Via https://spec.openapis.org/oas/v3.0.3.html
      # operationId: Unique string used to identify the operation. The id MUST be unique among all operations
      # described in the API. The operationId value is case-sensitive.
      operationId: this-is-a-kebabAndCamel_SNAKE
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: string
