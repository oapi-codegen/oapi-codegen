openapi: 3.1.0
info:
  title: Chi webhook receiver test
  version: 1.0.0
  description: |
    Same spec as internal/test/webhooks but generated with chi-server,
    verifying the chi-receiver.tmpl produces compilable code.
paths: {}
webhooks:
  petStatusChanged:
    post:
      operationId: PetStatusChanged
      summary: Notifies subscribers that a pet's status changed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PetStatusEvent'
      responses:
        '204':
          description: Acknowledged

components:
  schemas:
    PetStatusEvent:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
        status:
          type: string
          enum: [available, pending, sold]
